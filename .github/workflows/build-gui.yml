name: Build & Release GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build EGS-LL GUI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore gui/EGS-LL.csproj

      - name: Build Release
        run: dotnet build gui/EGS-LL.csproj -c Release --no-restore

      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item gui/bin/Release/net48/EGS-LL.exe artifact/
          Copy-Item gui/bin/Release/net48/EGS-LL.exe.config artifact/ -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EGS-LL-gui
          path: artifact/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: EGS-LL-gui
          path: release/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/EGS-LL.exe \
            release/EGS-LL.exe.config
