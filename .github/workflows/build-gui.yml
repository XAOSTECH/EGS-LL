name: Build GUI

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.0.0 or experimental)'
        required: false
        type: string
        default: 'experimental'
    outputs:
      artifact_name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact_name }}
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed'
        required: false
        type: string
        default: 'experimental'

jobs:
  build:
    name: Build EGS-LL GUI
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Set build metadata
        id: meta
        run: |
          $ver = '${{ inputs.version }}'
          if (-not $ver -or $ver -eq '') { $ver = 'experimental' }
          $ver = $ver -replace '^v', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "artifact_name=EGS-LL-gui" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Restore dependencies
        run: dotnet restore gui/EGS-LL.csproj

      - name: Build Release
        run: dotnet build gui/EGS-LL.csproj -c Release --no-restore /p:InformationalVersion=${{ steps.meta.outputs.version }}

      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item gui/bin/Release/net48/EGS-LL.exe artifact/
          Copy-Item gui/bin/Release/net48/EGS-LL.exe.config artifact/ -ErrorAction SilentlyContinue
          $hash = (Get-FileHash artifact/EGS-LL.exe -Algorithm SHA256).Hash
          "$hash  EGS-LL.exe" | Out-File artifact/SHA256SUMS.txt -Encoding utf8
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifact/
